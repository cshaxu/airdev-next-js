name: ChatMessage
api:
  cursors:
    - createdAt: desc
  methods:
    getMany:
    getOne:
prisma:
  externalFields:
    - chat
    - user
types:
  - name: ChatMessageContent
    import: '@/common/types/data/chat-message'
  - name: ChatMessageAttachment
    import: '@/common/types/data/chat-message'
fields:
  - id: 1
    internal: true
    name: content
    type: ChatMessageContent
    strategy: primitive
    cast: true
  - id: 2
    name: text
    type: string # | null
    strategy: computed
  - id: 3
    name: attachments
    type: ChatMessageAttachment[]
    strategy: primitive
    cast: true
