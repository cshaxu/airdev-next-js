name: User
model: UserModel
api:
  methods:
    getMany: '{ requireAdmin: true }'
    serverGetOne: '{ next: { tags: [`users:${params.id}`] } }'
    serverGetOneSafe: '{ next: { tags: [`users:${params.id}`] } }'
    search: '{ requireAdmin: true }'
    getOne: '{ requireLogin: false }'
    getOneSafe: '{ requireLogin: false }'
    updateOne: null
    deleteOne: '{ requireAdmin: true }'
types:
  - name: UserEmailPayload
    import: '@/common/types/data/user'
  - name: UserModel
    define: '{ id: string; createdAt: Date; updatedAt: Date; name: string; email: string; emailVerified: Date | null; imageUrl: string | null }'
keys:
  - id
fields:
  - id: 1
    name: id
    type: string
    strategy: primitive
    internal: false
  - id: 2
    name: createdAt
    type: Date
    strategy: primitive
    internal: false
  - id: 3
    name: updatedAt
    type: Date
    strategy: primitive
    internal: false
  - id: 4
    name: name
    type: string
    strategy: primitive
    internal: false
  - id: 5
    name: email
    type: string
    strategy: primitive
    internal: false
  - id: 6
    name: emailVerified
    type: Date | null
    strategy: primitive
    internal: false
  - id: 7
    name: imageUrl
    type: string | null
    strategy: primitive
    internal: false
  - id: 1
    name: isAdmin
    type: boolean
    strategy: computed
  - id: 2
    internal: true
    name: verifiedEmail
    type: string | null
    strategy: computed
  - id: 3
    internal: true
    name: emailPayload
    type: UserEmailPayload
    strategy: computedAsync
  - id: 4
    internal: true
    name: thisUserId
    type: string | null
    strategy: computed
